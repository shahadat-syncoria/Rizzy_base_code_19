<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clover Payment Form</title>
  <!-- Include Clover SDK -->
  <script src="https://checkout.sandbox.dev.clover.com/sdk.js"></script>
</head>
<body>

  <form action="/charge" method="post" id="payment-form">
    <div class="form-row top-row">
      <div id="amount" class="field card-number">
        <input name="amount" placeholder="Amount">
      </div>
    </div>

    <div class="form-row top-row">
      <div id="card-number" class="field card-number"></div>
      <div id="card-number" class="field card-number"></div>
      <div class="input-errors" id="card-number-errors" role="alert"></div>
    </div>

    <div class="form-row">
      <div id="card-date" class="field third-width"></div>
      <div class="input-errors" id="card-date-errors" role="alert"></div>
    </div>

    <div class="form-row">
      <div id="card-cvv" class="field third-width"></div>
      <div class="input-errors" id="card-cvv-errors" role="alert"></div>
    </div>

    <div class="form-row">
      <div id="card-postal-code" class="field third-width"></div>
      <div class="input-errors" id="card-postal-code-errors" role="alert"></div>
    </div>

    <div id="card-response" role="alert"></div>

    <div class="button-container">
      <button type="submit">Submit Payment</button>
    </div>
  </form>

  <script>
    // Configure Clover SDK
    const clover = new Clover('edc5b3bf9376bcd3d2bf1ccb27426754', {
      // Additional configurations if needed
      merchantId: '0RK8W76D9MDX1',
      locale: 'en-US'
    });
    const elements = clover.elements();

    // Get form element
    const form = document.getElementById('payment-form');

    // Create card elements and mount them
    const cardNumber = elements.create('CARD_NUMBER');
    const cardDate = elements.create('CARD_DATE');
    const cardCvv = elements.create('CARD_CVV');
    const cardPostalCode = elements.create('CARD_POSTAL_CODE');

    cardNumber.mount('#card-number');
    cardDate.mount('#card-date');
    cardCvv.mount('#card-cvv');
    cardPostalCode.mount('#card-postal-code');

    // Event listeners for error handling
    cardNumber.addEventListener('change', handleCardInputChange);
    cardNumber.addEventListener('blur', handleCardInputChange);
    cardDate.addEventListener('change', handleCardInputChange);
    cardDate.addEventListener('blur', handleCardInputChange);
    cardCvv.addEventListener('change', handleCardInputChange);
    cardCvv.addEventListener('blur', handleCardInputChange);
    cardPostalCode.addEventListener('change', handleCardInputChange);
    cardPostalCode.addEventListener('blur', handleCardInputChange);

    // Event listener for form submission
    form.addEventListener('submit', handleFormSubmit);

    // Function to handle form submission
    function handleFormSubmit(event) {
      event.preventDefault();
      clover.createToken().then(handleTokenResponse);
    }

    // Function to handle token response
    function handleTokenResponse(result) {
      const displayError = document.getElementById('card-response');
      if (result.errors) {
        Object.values(result.errors).forEach(function (value) {
          displayError.textContent = value;
        });
      } else {
        cloverTokenHandler(result.token);
      }
    }

    // Function to handle token submission to server
    function cloverTokenHandler(token) {
      const hiddenInput = document.createElement('input');
      hiddenInput.setAttribute('type', 'hidden');
      hiddenInput.setAttribute('name', 'cloverToken');
      hiddenInput.setAttribute('value', token);
      form.appendChild(hiddenInput);
      form.submit();
    }

    // Function to handle card input change
    function handleCardInputChange(event) {
      console.log(`Input changed: ${event}`);
      // Additional error handling logic if needed
    }
  </script>

</body>
</html>
